<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ResumeForge AI Resume Builder</title>
  <desc id="desc">A branded ResumeForge social preview image for an AI resume builder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f7ff"/>
      <stop offset="55%" stop-color="#e9f8f6"/>
      <stop offset="100%" stop-color="#f5edff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b5ef4"/>
      <stop offset="52%" stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#00c6ae"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#33366f" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="145" cy="110" r="180" fill="#5b5ef4" opacity="0.12"/>
  <circle cx="1050" cy="520" r="210" fill="#00c6ae" opacity="0.12"/>
  <circle cx="1005" cy="95" r="135" fill="#a259ff" opacity="0.12"/>
  <g filter="url(#shadow)">
    <rect x="120" y="100" width="960" height="430" rx="34" fill="#ffffff" opacity="0.88"/>
    <rect x="166" y="150" width="310" height="330" rx="22" fill="#f7f8ff" stroke="#d9dcff"/>
    <rect x="205" y="192" width="230" height="18" rx="9" fill="#0d0d2b" opacity="0.88"/>
    <rect x="205" y="238" width="186" height="12" rx="6" fill="#5b5ef4" opacity="0.75"/>
    <rect x="205" y="274" width="230" height="10" rx="5" fill="#9aa0c3"/>
    <rect x="205" y="300" width="198" height="10" rx="5" fill="#9aa0c3"/>
    <rect x="205" y="344" width="230" height="10" rx="5" fill="#9aa0c3"/>
    <rect x="205" y="370" width="170" height="10" rx="5" fill="#9aa0c3"/>
    <rect x="205" y="416" width="112" height="28" rx="14" fill="url(#accent)"/>
  </g>
  <g>
    <text x="535" y="230" fill="#0d0d2b" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="800">ResumeForge</text>
    <text x="538" y="286" fill="#4a4a6a" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600">AI resume builder for ATS-friendly resumes</text>
    <text x="538" y="350" fill="#4a4a6a" font-family="Arial, Helvetica, sans-serif" font-size="24">Technical, business, finance, HR, sales, and operations resumes</text>
    <rect x="538" y="398" width="250" height="54" rx="27" fill="url(#accent)"/>
    <text x="576" y="433" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Build with AI</text>
  </g>
</svg>
